# ---------------------------------------------------------
# Run once a day at 7AM UK time, even if no code changed
# ---------------------------------------------------------
schedules:
- cron: "0 7 * * *"
  displayName: Daily 7AM Run
  branches:
    include:
    - main
  always: true

# ---------------------------------------------------------
# Pipeline steps
# ---------------------------------------------------------
steps:

- task: PublishTestResults@2
  displayName: Publish NUnit Results
  inputs:
    testResultsFormat: NUnit
    testResultsFiles: '**/TestResult*.xml'
