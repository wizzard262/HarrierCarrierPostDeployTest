# ---------------------------------------------------------
# Run once a day at 7AM UK time, even if no code changed
# ---------------------------------------------------------
schedules:
- cron: "0 7 * * *"
  displayName: Daily 7AM Run
  branches:
    include:
    - main
  always: true

# ---------------------------------------------------------
# Pipeline steps
# ---------------------------------------------------------
steps:

# Force .NET version to 8
- task: UseDotNet@2
  displayName: Install .NET 8 SDK
  inputs:
    packageType: 'sdk'
    version: '8.x'

# Show .NET info
- script: dotnet --info
  displayName: Show dotnet info

# Build the test project so the Playwright CLI exists
- script: dotnet build HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest.csproj
  displayName: Build test project

# Install Playwright dependencies for Ubuntu 24.04
- script: |
    sudo apt-get update
    sudo apt-get install -y \
      libasound2t64 \
      libatk1.0-0 \
      libcups2 \
      libdbus-1-3 \
      libdrm2 \
      libgbm1 \
      libglib2.0-0 \
      libgtk-3-0 \
      libnspr4 \
      libnss3 \
      libx11-6 \
      libx11-xcb1 \
      libxcb1 \
      libxcomposite1 \
      libxdamage1 \
      libxext6 \
      libxfixes3 \
      libxrandr2 \
      libxshmfence1 \
      libxtst6 \
      libx264-164 \
      libffi8
  displayName: Install Playwright dependencies (Ubuntu 24.04)

# Install Playwright browsers using the project-local CLI
- script: pwsh HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/bin/Debug/net8.0/playwright.ps1 install chromium
  displayName: Install Playwright Browsers (Chromium only)

# Create TestResults folder
- script: mkdir -p $(Build.SourcesDirectory)/TestResults
  displayName: Create TestResults folder

# Run tests with TRX output
- task: DotNetCoreCLI@2
  displayName: Run tests with TRX output
  inputs:
    command: test
    projects: 'HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest.csproj'
    arguments: '--logger "trx;LogFileName=TestResults.trx" --results-directory $(Build.SourcesDirectory)/TestResults'

# Publish TRX results
- task: PublishTestResults@2
  displayName: Publish TRX Results
  inputs:
    testResultsFormat: VSTest
    testResultsFiles: '$(Build.SourcesDirectory)/TestResults/TestResults.trx'
