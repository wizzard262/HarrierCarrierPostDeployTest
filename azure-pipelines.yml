# ---------------------------------------------------------
# Run once a day at 7AM UK time, even if no code changed
# ---------------------------------------------------------
schedules:
- cron: "0 7 * * *"
  displayName: Daily 7AM Run
  branches:
    include:
    - main
  always: true

# ---------------------------------------------------------
# Pipeline steps
# ---------------------------------------------------------
steps:

# Lock SDK to .NET 8
- task: UseDotNet@2
  displayName: Install .NET 8 SDK
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# Show .NET info
- script: dotnet --info
  displayName: Show dotnet info

# Build Test Product
- script: dotnet build HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest.csproj
  displayName: Build test project


# Install Playwright dependencies for Ubuntu 24.04
- script: |
    sudo apt-get update
    sudo apt-get install -y --no-install-recommends \
      libasound2t64 \
      libatk1.0-0 \
      libcups2 \
      libdbus-1-3 \
      libdrm2 \
      libgbm1 \
      libglib2.0-0 \
      libgtk-3-0 \
      libnspr4 \
      libnss3 \
      libx11-6 \
      libx11-xcb1 \
      libxcb1 \
      libxcomposite1 \
      libxdamage1 \
      libxext6 \
      libxfixes3 \
      libxrandr2 \
      libxshmfence1 \
      libxtst6 \
      libx264-164 \
      libffi8
  displayName: Install Playwright dependencies (Ubuntu 24.04)

# Install Playwright browsers using the project-local CLI (Chromium only)
- script: pwsh HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/bin/Debug/net8.0/playwright.ps1 install chromium
  displayName: Install Playwright Browsers (Chromium only)

# Run tests with console output (prints results live to pipeline logs)
- task: DotNetCoreCLI@2
  displayName: Run tests with console output
  inputs:
    command: test
    projects: 'HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest.csproj'
    arguments: '--logger "console;verbosity=detailed"'
  env:
    PLAYWRIGHT_CHROMIUM_SANDBOX: "0"
