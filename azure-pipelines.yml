# ---------------------------------------------------------
# Run once a day at 7AM UK time, even if no code changed
# ---------------------------------------------------------
schedules:
- cron: "0 7 * * *"
  displayName: Daily 7AM Run
  branches:
    include:
    - main
  always: true

# ---------------------------------------------------------
# Pipeline steps
# ---------------------------------------------------------
steps:
- task: UseDotNet@2
  displayName: Install .NET 8 SDK
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet --info
  displayName: Show dotnet info

- script: pwsh -Command "dotnet tool install --global Microsoft.Playwright.CLI"
  displayName: Install Playwright CLI

- script: pwsh -Command "playwright install"
  displayName: Install Playwright Browsers

- script: mkdir -p $(Build.SourcesDirectory)/TestResults
  displayName: Create TestResults folder

- task: DotNetCoreCLI@2
  displayName: Run tests with TRX output
  inputs:
    command: test
    projects: 'HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest/HarrierCarrierPostDeployTest.csproj'
    arguments: '--logger "trx;LogFileName=TestResults.trx" --results-directory $(Build.SourcesDirectory)/TestResults'

- task: PublishTestResults@2
  displayName: Publish TRX Results
  inputs:
    testResultsFormat: VSTest
    testResultsFiles: '$(Build.SourcesDirectory)/TestResults/TestResults.trx'
