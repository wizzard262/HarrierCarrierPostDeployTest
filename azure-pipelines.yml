# ---------------------------------------------------------
# Run once a day at 7AM UK time, even if no code changed
# ---------------------------------------------------------
schedules:
- cron: "0 7 * * *"
  displayName: Daily 7AM Run
  branches:
    include:
    - main
  always: true


# ---------------------------------------------------------
# Pipeline steps
# ---------------------------------------------------------
steps:

  # Publish Playwright report (only if tests fail)
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Playwright Report'
    condition: always()
    inputs:
      pathToPublish: 'playwright-report'
      artifactName: 'playwright-report'